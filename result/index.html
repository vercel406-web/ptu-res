<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Result | IKGPTU</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet"
        href="https://ptu.ac.in/wp-content/themes/cynic/css/classic-modern-agency/bootstrap.css?ver=6.9.4">
    <link rel="stylesheet"
        href="https://ptu.ac.in/wp-content/themes/cynic/css/classic-modern-agency/font-awesome.min.css?ver=6.9.4">
</head>
<body class="wp-theme-cynic wp-child-theme-cynic-child">
    <section style="background:#c8e7ff;border-bottom:1px solid #9fc6e5;">
        <div class="container" style="max-width:1000px;text-align:center;padding:22px 10px 14px;">
            <div style="font-size:46px;line-height:1;color:#0a2d4a;margin-bottom:4px;">Punjabi University,Patiala</div>
            <div style="font-size:18px;color:#0a2d4a;font-weight:600;">(Established under Punjab Act No. 35 of 1961)</div>
            <div style="font-size:28px;color:#0a2d4a;font-weight:700;">ਪੰਜਾਬੀ ਯੂਨੀਵਰਸਿਟੀ, ਪਟਿਆਲਾ</div>
        </div>
    </section>
    <section style="background:#fff;border-bottom:1px solid #d6d6d6;">
        <div class="container" style="max-width:1000px;padding:6px 10px;text-align:right;font-weight:700;color:#000;">
            No DMC/Provisional Intimation of Result has been Issued for Reappear / Fail Students.
        </div>
    </section>
    <section style="padding:12px 0 40px;background:#2ebdb1;min-height:calc(100vh - 120px);">
        <div class="container" style="max-width:1000px;">
            <div style="text-align:center;margin-bottom:8px;">
                <h2 style="margin:0;font-size:34px;font-weight:700;color:#000;">Result Examination</h2>
            </div>
            <div style="text-align:center;margin-bottom:12px;">
                <form id="resultForm" action="#" method="post" style="display:inline-block;">
                    <label for="rollNo" style="margin-right:8px;font-weight:700;color:#000;">Roll Number :</label>
                    <input id="rollNo" name="rollNo" type="text" style="width:120px;height:28px;border:1px solid #777;" required>
                    <label for="resultYear" style="margin:0 8px 0 12px;font-weight:700;color:#000;">Year :</label>
                    <input id="resultYear" name="resultYear" type="number" min="1997" max="2100" style="width:84px;height:28px;border:1px solid #777;" required>
                    <button type="submit" class="btn btn-default btn-sm" style="margin-left:8px;padding:4px 12px;height:28px;">Submit</button>
                </form>
                <div id="resultMessage" style="margin-top:8px;font-weight:700;color:#000;"></div>
            </div>
            <div id="resultCard" style="display:none;">
                <div style="margin-bottom:8px;font-weight:700;text-align:center;color:#000;">Roll Number: <span id="rRoll"></span> | Year: <span id="rSession"></span></div>
                <div id="resultPdfPages" style="background:#fff;padding:8px 0;"></div>
            </div>
        </div>
    </section>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function renderPdfWithoutControls(pdfSource) {
            var container = document.getElementById('resultPdfPages');
            container.innerHTML = '';
            var loadingTask = pdfjsLib.getDocument(pdfSource);
            var pdf = await loadingTask.promise;
            for (var pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
                var page = await pdf.getPage(pageNumber);
                var viewport = page.getViewport({ scale: 1.3 });
                var canvas = document.createElement('canvas');
                canvas.style.display = 'block';
                canvas.style.margin = '0 auto 12px';
                canvas.style.boxShadow = '0 0 0 1px #ddd';
                var context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                container.appendChild(canvas);
            }
        }

        document.getElementById('resultForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            var rollNo = document.getElementById('rollNo').value.trim();
            var message = document.getElementById('resultMessage');
            var card = document.getElementById('resultCard');
            card.style.display = 'none';
            message.style.color = '#0f172a';
            message.textContent = 'Loading...';
            try {
                var year = document.getElementById('resultYear').value.trim();
                var response = await fetch('/api/results/get?rollNumber=' + encodeURIComponent(rollNo) + '&year=' + encodeURIComponent(year));
                var data = await response.json();
                if (!response.ok || !data.ok) {
                    message.style.color = '#b91c1c';
                    message.textContent = data.message || 'Result not found';
                    return;
                }
                var result = data.result;
                document.getElementById('rRoll').textContent = result.rollNumber || '-';
                document.getElementById('rSession').textContent = result.session || '-';
                var pdfSource = result.pdfUrl || '';
                if (!pdfSource) {
                    message.style.color = '#b91c1c';
                    message.textContent = 'PDF not found';
                    return;
                }
                await renderPdfWithoutControls(pdfSource);
                card.style.display = 'block';
                message.style.color = '#166534';
                message.textContent = 'Result found';
            } catch (error) {
                message.style.color = '#b91c1c';
                message.textContent = 'Unable to fetch result';
            }
        });
    </script>
</body>
</html>
