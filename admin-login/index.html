<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login | IKGPTU</title>
    <link rel="icon" href="https://ptu.ac.in/wp-content/uploads/2020/05/favicon-32x32-1.png">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet"
        href="https://ptu.ac.in/wp-content/themes/cynic/css/classic-modern-agency/bootstrap.css?ver=6.9.4">
    <link rel="stylesheet"
        href="https://ptu.ac.in/wp-content/themes/cynic/css/classic-modern-agency/font-awesome.min.css?ver=6.9.4">
</head>
<body class="wp-theme-cynic wp-child-theme-cynic-child">
    <nav class="navbar main-menu" style="margin-bottom:0;">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="/">IKGPTU</a>
            </div>
            <ul class="nav navbar-nav navbar-right">
                <li><a href="/">Home</a></li>
                <li><a href="/result">Result</a></li>
                <li><a href="/admin-login">Admin Login</a></li>
                <li><a href="/upload-result">Upload Result</a></li>
            </ul>
        </div>
    </nav>
    <section style="padding:60px 0;background:#f7f9fc;min-height:calc(100vh - 50px);">
        <div class="container">
            <div class="row">
                <div class="col-md-6 col-md-offset-3">
                    <div class="panel panel-default">
                        <div class="panel-heading">
                            <h3 class="panel-title">Admin Login</h3>
                        </div>
                        <div class="panel-body">
                            <form id="adminLoginForm" action="#" method="post">
                                <div class="form-group">
                                    <label for="username">Username</label>
                                    <input id="username" name="username" type="text" class="form-control"
                                        placeholder="Enter Username" required>
                                </div>
                                <div class="form-group">
                                    <label for="password">Password</label>
                                    <input id="password" name="password" type="password" class="form-control"
                                        placeholder="Enter Password" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">Login</button>
                            </form>
                            <div id="loginMessage" style="margin-top:12px;font-weight:600;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var message = document.getElementById('loginMessage');
            var hardcodedUsername = 'admin';
            var hardcodedPassword = 'admin123';
            message.style.color = '#0f172a';
            message.textContent = 'Verifying...';
            if (username === hardcodedUsername && password === hardcodedPassword) {
                sessionStorage.setItem('admin_username', username);
                sessionStorage.setItem('admin_password', password);
                sessionStorage.setItem('admin_authenticated', 'true');
                message.style.color = '#166534';
                message.textContent = 'Login successful. Redirecting...';
                window.location.href = '/upload-result';
                return;
            }
            message.style.color = '#b91c1c';
            message.textContent = 'Invalid username or password';
        });
    </script>
</body>
</html>
